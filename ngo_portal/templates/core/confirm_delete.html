{% extends "base.html" %}

{% block title %}Confirm Deletion — Seva Setu{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 p-4 mt-5 bg-white text-center">
            <div class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger rounded-circle p-3 mb-4 mx-auto" style="width: 72px; height: 72px;">
                <i class="bi bi-exclamation-triangle-fill fs-1"></i>
            </div>
            
            <h3 class="fw-bold text-dark mb-2">Are you sure?</h3>
            <p class="text-secondary mb-4">This action is permanent and cannot be undone. The record associated with <strong>"{{ object }}"</strong> will be deleted from the database.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 py-2.5 rounded-3 fw-bold mb-2">
                    <i class="bi bi-trash3-fill me-1"></i> Yes, Delete Record
                </button>
                <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-outline-secondary w-100 py-2.5 rounded-3 fw-semibold">
                    Cancel and Return
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
